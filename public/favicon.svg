<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Accent Gradient for Heartbeat -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle with subtle border -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#0EA5E9" stroke-width="8" stroke-opacity="0.3" />
  
  <!-- Outer glowing ring fragment (representing cardiology/radiology waves) -->
  <path d="M 256,40 A 216,216 0 0,1 472,256" fill="none" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-dasharray="15 10" opacity="0.6" />
  <path d="M 256,472 A 216,216 0 0,1 40,256" fill="none" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-dasharray="15 10" opacity="0.6" />

  <!-- Heart Shape Container (Stylized Medical Shield) -->
  <path d="M 256,120 
           C 290,70  390,70  400,170 
           C 410,250 320,330 256,400 
           C 192,330 102,250 112,170 
           C 122,70  222,70  256,120 Z" 
        fill="#0F172A" 
        fill-opacity="0.8"
        stroke="#0EA5E9" 
        stroke-width="12" 
        stroke-linejoin="round"
        stroke-linecap="round"
        filter="url(#glow)" />

  <!-- Pulse / Heartbeat (ECG Line) weaving through the heart -->
  <path d="M 140,220 
           H 200 
           L 220,150 
           L 245,290 
           L 270,110 
           L 295,250 
           L 310,190 
           L 325,220 
           H 372" 
        fill="none" 
        stroke="url(#accentGrad)" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Medical Cross Accent (Top Right) -->
  <g transform="translate(340, 110) scale(0.6)">
    <circle cx="40" cy="40" r="35" fill="#0EA5E9" opacity="0.2"/>
    <path d="M 40,15 V 65 M 15,40 H 65" stroke="#0EA5E9" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
